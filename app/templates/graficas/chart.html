{% extends "appbuilder/base.html" %}

{% block head_css %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='css/graficas.css') }}">
{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="graph-hero">
    <h2 class="graph-title">{{ titulo }}</h2>
    <p class="graph-subtitle">{{ subtitulo }}</p>
    <span class="label label-info">Elementos graficados: {{ total_items }}</span>
  </div>

  <div class="graph-card">
    <canvas id="mainChart" height="110"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const labels = {{ labels|safe }};
const values = {{ values|safe }};

new Chart(document.getElementById('mainChart'), {
  type: '{{ chart_type }}',
  data: {
    labels: labels,
    datasets: [{
      label: '{{ titulo }}',
      data: values,
      borderWidth: 2,
      backgroundColor: ['#1abc9c', '#3498db', '#9b59b6', '#f39c12', '#e74c3c', '#2ecc71', '#34495e'],
      borderColor: '#ffffff'
    }]
  },
  options: {
    responsive: true,
    scales: {{ '{}' if chart_type in ['doughnut', 'polarArea'] else '{y: {beginAtZero: true}}' }}
  }
});
</script>
{% endblock %}
